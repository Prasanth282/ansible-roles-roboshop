   - name: app_setup
     include_role:
      name: common
      tasks_from: app_setup

   - name: nodejs_setup
     include_role: 
      name: common
      tasks_from: nodejs_setup

   - name: systemd_setup
     include_role: 
      name: common
      tasks_from: systemd_setup

   - name: creating cart service
     ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/cart.service

   - name: system user reload 
     ansible.builtin.systemd_reload:
      daemon_reload: true 
