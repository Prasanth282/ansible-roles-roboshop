   - name: app_setup
     include_role:
      name: common
      tasks_from: app_setup

   - name: nodejs_setup
     import_role:
      name: common
      tasks_from: nodejs_setup
     tags: 
      - nodejs

   - name: systemd_setup
     include_role:
      name: common
      tasks_from: systemd_setup

   - name: copying mongo.reo to install the mongodb clinet package 
     ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

   - name: installing mongodb client package 
     ansible.builtin.package:
      name: mongodb-mongosh -y
      state: present

   - name: checking data loaded to db server or not 
     ansible.builtin.command: mongosh --host {{ MONGODB_HOST }} --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
     register: command_output

   - name: checking data loaded or not 
     ansible.builtin.debug:
      msg: "{{ command_output }}" 

   - name: load the data 
     ansible.builtin.shell: mongosh --host {{ MONGODB_HOST }} < /app/db/master-data.js
     when: command_output.stdout | int < 0  # the data will load when the stdout value -1 the data is not present, more than -1 means data present 
      
     
     



   

   

   
