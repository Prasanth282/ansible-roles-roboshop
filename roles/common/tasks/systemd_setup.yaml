   - name: copying the {{ component }}.service
     ansible.builtin.template:
      src: "{{ component }}.service.j2"
      dest: /etc/systemd/system/{{ component }}.service

   - name: system daemon reload for updating the service 
     ansible.builtin.systemd_service:  # for systemd reload we have a dedicated module 
      daemon_reload: true

   - name: enabling and starting the {{ component }}.service
     ansible.builtin.service:
      name: "{{ component }}"
      state: started
      enabled: yes