#stop the service
#remove the /app directory 
# createb the /app directory 
# download the new version code 
# restart the service 

- name: stoppping the {{ component }}
  tags:
   -deployment
  anisble.builtin.service:
   name: "{{ component }}"
   state: stopped 

 - name: removing /app directory
   ansible.builtin.file:
    path: /app
    state: absent

 - name: creating /app directory
   ansible.builtin.file:
    name: /app
    state: directory 

 - name: download application
   ansible.builtin.unarchive:
    src: "https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-{{ app-version }}.zip"
    dest: /app
    remote_src: yes

 - name: dependencies install
   community.general.npm:
    path: /app

 - name: restart the service 
   ansible.builtin.service:
    name: "{{ component }}"
    state: restarted 


 